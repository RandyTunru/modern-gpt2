project_name: "baby-llama-110m"
run_name: "run-01-sft-2048"

vocab_size: 32000
d_model: 768
num_heads: 12
d_ff: 2048
num_layers: 12
max_seq_len: 2048  # Extended Context
original_seq_len: 1024 # Original context length used in pretraining

# Training Hyperparameters
batch_size: 8                 
gradient_accumulation_steps: 2 
learning_rate: 2.0e-5          # CPT uses a lower learning rate than baseline pretraining
warmup_steps: 250
weight_decay: 0.1
max_steps: 5000              # Shorter CPT phase
log_every: 50
save_every: 1000

# Paths
from_checkpoint: "artifacts/checkpoints/2048_seq_cpt/model_step_final.pt"
data_path: "data/processed/openhermes/2048_openhermes.bin"
checkpoint_dir: "artifacts/checkpoints/2048_sft/"
wandb_dir: "logs/wandb/"

# Additional Configurations
num_workers: 4
drop_last: True
no_epochs: True
use_sft_masking: True  # Enable SFT block diagonal masking